<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <nav class="premium-nav">
        <div class="logo">
            <div class="play-icon">▶</div>
            <h1>YouTube <span>Premium</span></h1>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search YouTube...">
            <button onclick="handleNewSearch()">🔍</button>
        </div>
    </nav>

    <div class="app-container">
        <div id="playerSection" class="player-container hidden">
            <div class="video-wrapper">
                <div id="ytPlayer"></div> 
                
                <div class="custom-controls" id="customControls">
                    <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">⏸️</button>
                    <div class="progress-container">
                        <span id="currentTime">0:00</span>
                        <input type="range" id="progressBar" value="0" max="100">
                        <span id="totalTime">0:00</span>
                    </div>
                    <button class="ctrl-btn" onclick="toggleMute()">🔊</button>
                </div>
            </div>
            <div class="player-header">
                <h2 id="nowPlayingTitle">Loading...</h2>
                <button class="close-btn" onclick="closePlayer()">✕</button>
            </div>
        </div>

        <main id="resultsContainer" class="results-grid">
            </main>
        
        <div id="loadingSentinel" class="loader-container hidden">
            <div class="spinner"></div>
            <p style="color: var(--text-muted);">Loading more videos...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
