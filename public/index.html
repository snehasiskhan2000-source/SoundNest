<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TubeNest | Video & Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><span class="highlight">Tube</span>Nest</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search YouTube videos & music...">
                <button onclick="searchYouTube()">Search</button>
            </div>
        </header>

        <div id="playerSection" class="player-container hidden">
            <div class="video-wrapper">
                <iframe id="ytPlayer" src="" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
            </div>
            <h2 id="nowPlayingTitle">Loading...</h2>
        </div>

        <main id="resultsContainer" class="results-grid">
            <p style="text-align: center; color: var(--text-muted); width: 100%; grid-column: 1/-1;">Search for a video to start watching.</p>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
